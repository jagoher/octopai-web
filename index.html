<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>OCTOPAI | Structuring Chaos</title>

  <meta
    name="description"
    content="OCTOPAI — Turning entropy into intelligence."
  >

  <style>
    :root {
      --background: #03040f;
      --text: #f4f4fb;
      --muted: #a8a8ba;
      --violet: #8b2cff;
      --blue: #168cff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(
          circle at 50% 28%,
          rgba(87, 43, 255, 0.13),
          transparent 31%
        ),
        radial-gradient(
          circle at 50% 43%,
          rgba(0, 126, 255, 0.08),
          transparent 34%
        ),
        var(--background);
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 100px;
      text-align: center;
    }

    .content {
      width: min(92vw, 760px);
    }

    .logo {
      display: block;
      width: min(100%, 550px);
      height: auto;
      margin: 0 auto;
      background: transparent;
      filter: drop-shadow(
        0 0 22px rgba(68, 49, 255, 0.16)
      );
    }

    .coming-soon {
      margin-top: 34px;
      font-size: clamp(1.25rem, 3vw, 2rem);
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      background: linear-gradient(
        90deg,
        var(--violet),
        var(--blue)
      );
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .divider {
      position: relative;
      width: min(280px, 62vw);
      height: 1px;
      margin: 26px auto 28px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(53, 108, 255, 0.9),
        transparent
      );
    }

    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: #55d8ff;
      box-shadow:
        0 0 8px #2f8cff,
        0 0 18px #2f8cff;
    }

    .tagline {
      max-width: 620px;
      margin: 0 auto;
      color: rgba(255, 255, 255, 0.82);
      font-size: clamp(1rem, 2vw, 1.22rem);
      line-height: 1.6;
    }

    .links {
      margin-top: 30px;
    }

    .github-link {
      display: inline-block;
      padding: 12px 26px;
      border: 1px solid rgba(90, 130, 255, 0.48);
      border-radius: 999px;
      color: #d9ddff;
      text-decoration: none;
      font-size: 0.98rem;
      letter-spacing: 0.05em;
      background: rgba(12, 15, 38, 0.45);
      transition:
        transform 0.25s ease,
        color 0.25s ease,
        border-color 0.25s ease,
        background 0.25s ease,
        box-shadow 0.25s ease;
    }

    .github-link:hover,
    .github-link:focus-visible {
      color: #ffffff;
      border-color: #3b8cff;
      background: rgba(59, 140, 255, 0.12);
      box-shadow: 0 0 22px rgba(59, 140, 255, 0.25);
      transform: translateY(-2px);
      outline: none;
    }

    .wave {
      position: fixed;
      left: -8%;
      right: -8%;
      bottom: -7vh;
      height: 28vh;
      z-index: 0;
      opacity: 0.7;
      pointer-events: none;
      background:
        radial-gradient(
          ellipse at 18% 100%,
          rgba(124, 28, 255, 0.42),
          transparent 48%
        ),
        radial-gradient(
          ellipse at 82% 100%,
          rgba(0, 111, 255, 0.42),
          transparent 48%
        );
      filter: blur(1px);
    }

    .wave::before,
    .wave::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-radial-gradient(
          ellipse at 50% 115%,
          transparent 0 13px,
          rgba(69, 83, 255, 0.32) 14px 15px,
          transparent 16px 28px
        );
      transform: scaleX(1.3);
      mask-image: linear-gradient(
        to top,
        black,
        transparent 88%
      );
      -webkit-mask-image: linear-gradient(
        to top,
        black,
        transparent 88%
      );
    }

    .wave::after {
      opacity: 0.5;
      transform: scaleX(1.55) translateY(10px);
    }

    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      z-index: 2;
      padding-left: 20px;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-align: left;
    }

    @media (max-width: 600px) {
      body {
        overflow-y: auto;
      }

      .page {
        min-height: 100svh;
        padding: 24px 18px 100px;
      }

      .logo {
        width: min(100%, 430px);
      }

      .coming-soon {
        margin-top: 28px;
        letter-spacing: 0.18em;
      }

      .tagline {
        font-size: 0.98rem;
      }

      .github-link {
        padding: 11px 22px;
        font-size: 0.9rem;
      }

      .wave {
        height: 21vh;
      }

      footer {
        padding-left: 16px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>

<body>

  <main class="page">
    <section class="content">

      <img
        src="octopai-logo.png"
        alt="OCTOPAI — Structuring Chaos"
        class="logo"
      >

      <h1 class="coming-soon">
        Coming Soon
      </h1>

      <div
        class="divider"
        aria-hidden="true"
      ></div>

      <p class="tagline">
        Turning entropy into intelligence.
      </p>

      <div class="links">
        <a
          href="https://github.com/jagoher/"
          class="github-link"
          target="_blank"
          rel="noopener noreferrer"
        >
          Explore my projects →
        </a>
      </div>

    </section>
  </main>

  <div
    class="wave"
    aria-hidden="true"
  ></div>

  <footer>
    OCTOPAI · 2026
  </footer>

</body>
</html>

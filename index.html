<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OCTOPAI | Structuring Chaos</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050510;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        main {
            width: 90%;
            max-width: 800px;
        }

        .logo {
            width: 100%;
            max-width: 650px;
            height: auto;
        }

        .message {
            margin-top: 35px;
            color: #b8b8c7;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            color: #6f6f80;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <main>
        <img
            src="octopai-logo.png"
            alt="OCTOPAI - Structuring Chaos"
            class="logo"
        >

        <p class="message">Website under construction</p>
    </main>

    <footer>
        © 2026 OCTOPAI
    </footer>

</body>
</html>
